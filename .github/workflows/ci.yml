name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, mbstring
          tools: composer

      - name: PHP Syntax Check
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n 1 -P 4 php -l

  php-test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring
          tools: composer

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Verify generated settings contract
        run: composer settings-contract:check

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --no-coverage

  phpstan:
    name: PHPStan Static Analysis
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration phpstan.neon --memory-limit=1G --no-progress

  frontend:
    name: Frontend Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: vite/package.json

      - name: Install Dependencies
        working-directory: vite
        run: pnpm install --frozen-lockfile

      - name: Type Check
        working-directory: vite
        run: pnpm run typecheck

      - name: Lint
        working-directory: vite
        run: pnpm run lint

      - name: Run Vitest with coverage
        working-directory: vite
        run: pnpm run test:coverage

      - name: Build
        working-directory: vite
        run: pnpm run build

      - name: Verify frontend build outputs
        run: |
          test -s vite/admin/dist/index.js
          test -s vite/admin/dist/index.css
          test -s vite/count/dist/index.js
          test -s vite/count/dist/index.css
          test ! -e vite/public

      - name: Upload frontend build outputs
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            vite/admin/dist
            vite/count/dist
          retention-days: 1

  build:
    name: Build Plugin ZIP
    runs-on: ubuntu-latest
    needs: [php-test, phpstan, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Download frontend build outputs
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: vite

      - name: Build release ZIP
        run: composer release:build

      - name: Verify release ZIP
        run: composer release:verify -- wp-magick-toolbox.zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-magick-toolbox
          path: |
            wp-magick-toolbox.zip
            wp-magick-toolbox.zip.sha256
          if-no-files-found: error
          retention-days: 30
